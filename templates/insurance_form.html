<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>توليد وثيقة تأمين المركبات</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Cairo', sans-serif; background: #f0f2f5; min-height: 100vh; color: #1a1a1a; }

    header {
      background: #0d47a1; color: white; padding: 18px 32px;
      display: flex; align-items: center; gap: 14px;
      box-shadow: 0 3px 12px rgba(0,0,0,0.2);
    }
    header svg { flex-shrink: 0; }
    header h1  { font-size: 20px; font-weight: 700; }
    header p   { font-size: 12px; opacity: 0.75; margin-top: 2px; }

    main { max-width: 900px; margin: 28px auto; padding: 0 16px 60px; }

    .card {
      background: white; border-radius: 14px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      margin-bottom: 20px; overflow: hidden;
    }
    .card-header {
      background: #e3f2fd; border-bottom: 2px solid #bbdefb;
      padding: 12px 20px; display: flex; align-items: center; gap: 8px;
      font-weight: 700; font-size: 14px; color: #0d47a1;
    }
    .card-body { padding: 20px; }

    .grid { display: grid; gap: 14px; }
    .grid-2 { grid-template-columns: 1fr 1fr; }
    .grid-3 { grid-template-columns: 1fr 1fr 1fr; }
    @media (max-width: 640px) { .grid-2, .grid-3 { grid-template-columns: 1fr; } }

    .field label {
      display: block; font-size: 11.5px; font-weight: 600;
      color: #555; margin-bottom: 5px;
    }
    .field input {
      width: 100%; padding: 8px 11px; border: 1.5px solid #ddd;
      border-radius: 8px; font-family: 'Cairo', sans-serif;
      font-size: 13px; color: #1a1a1a; background: #fafafa;
      transition: border-color 0.15s, box-shadow 0.15s; outline: none;
    }
    .field input:focus {
      border-color: #1565c0; box-shadow: 0 0 0 3px rgba(21,101,192,0.12); background: white;
    }
    .field input.number { font-family: monospace; font-size: 12.5px; }

    .btn {
      flex: 1; min-width: 200px; padding: 13px 20px; border: none;
      border-radius: 10px; font-family: 'Cairo', sans-serif;
      font-size: 14px; font-weight: 700; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: transform 0.12s, box-shadow 0.12s;
    }
    .btn:active { transform: scale(0.97); }
    .btn-ins { background: #0d47a1; color: white; box-shadow: 0 3px 10px rgba(13,71,161,0.3); }
    .btn-ins:hover { background: #1565c0; }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }

    .btn-back {
      background: none; border: 1.5px solid #ccc; color: #555;
      padding: 8px 16px; font-size: 12px; border-radius: 8px;
      font-family: 'Cairo', sans-serif; cursor: pointer;
    }

    #toast {
      position: fixed; bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #0d47a1; color: white; padding: 12px 28px;
      border-radius: 50px; font-size: 13px; font-weight: 600;
      box-shadow: 0 6px 20px rgba(0,0,0,0.25);
      transition: transform 0.3s ease; z-index: 99; white-space: nowrap;
    }
    #toast.show { transform: translateX(-50%) translateY(0); }
    #toast.error { background: #c62828; }
  </style>
</head>
<body>

<header>
  <svg width="40" height="40" viewBox="0 0 100 100">
    <circle cx="50" cy="50" r="48" fill="white" opacity="0.15"/>
    <rect x="22" y="25" width="56" height="50" rx="5" fill="white" opacity="0.9"/>
    <path d="M35 42h30M35 52h25M35 62h20" stroke="#0d47a1" stroke-width="3" stroke-linecap="round"/>
    <circle cx="72" cy="32" r="14" fill="#1565c0"/>
    <path d="M67 32l4 4 8-8" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </svg>
  <div>
    <h1>توليد وثيقة تأمين المركبات</h1>
    <p>أدخل البيانات ثم اضغط توليد — سيُنزَّل ملف PDF</p>
  </div>
</header>

<main>
  <div style="margin-bottom:16px;">
    <a href="/form" class="btn-back" style="text-decoration:none;">→ العودة لمولّد الفحص</a>
  </div>

  <!-- معلومات الوثيقة -->
  <div class="card">
    <div class="card-header">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 4H7a2 2 0 01-2-2V6a2 2 0 012-2h5l2 2h3a2 2 0 012 2v12a2 2 0 01-2 2z"/>
      </svg>
      معلومات الوثيقة
    </div>
    <div class="card-body">
      <div class="grid grid-2">
        <div class="field">
          <label>رقم الوثيقة (Policy Number)</label>
          <input id="policy_no" class="number" value="P1223-MTI-MDBS-087456325"/>
        </div>
        <div class="field">
          <label>رمز المنتج (Product Code)</label>
          <input id="product_code" class="number" value="A-RAJH-1-B-15-007"/>
        </div>
        <div class="field">
          <label>تاريخ بداية التأمين</label>
          <input id="ins_date" value="28/03/2026     11:12 AM"/>
        </div>
        <div class="field">
          <label>تاريخ انتهاء التأمين</label>
          <input id="exp_date" value="27/03/2027     11:12 AM"/>
        </div>
      </div>
    </div>
  </div>

  <!-- بيانات المؤمن له -->
  <div class="card">
    <div class="card-header">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
      </svg>
      بيانات المؤمن له
    </div>
    <div class="card-body">
      <div class="grid grid-2">
        <div class="field">
          <label>اسم المؤمن له</label>
          <input id="insured_name" value="سليمان احمد عبداهلل العنزي" dir="rtl"/>
        </div>
        <div class="field">
          <label>رقم الهوية / الإقامة</label>
          <input id="national_id" class="number" value="1137221345"/>
        </div>
        <div class="field" style="grid-column: span 2;">
          <label>العنوان الوطني</label>
          <input id="address" class="number" value="4238 Street No. 745 , Riyadh  District 6548"/>
        </div>
      </div>
    </div>
  </div>

  <!-- بيانات المركبة -->
  <div class="card">
    <div class="card-header">
      <svg width="16" height="16" fill="currentColor" viewBox="0 0 20 20">
        <path d="M8 16.5a1.5 1.5 0 11-3 0 1.5 1.5 0 013 0zM15 16.5a1.5 1.5 0 11-3 0 1.5 1.5 0 013 0z"/>
        <path d="M3 4a1 1 0 00-1 1v8a1 1 0 001 1h1.05a2.5 2.5 0 014.9 0H10a1 1 0 001-1V9a1 1 0 00-.293-.707L8 5.586A1 1 0 007.293 5H3z"/>
      </svg>
      بيانات المركبة
    </div>
    <div class="card-body">
      <div class="grid grid-2">
        <div class="field">
          <label>الرقم التسلسلي / رقم البطاقة الجمركية</label>
          <input id="seq_no" class="number" value="229206700"/>
        </div>
        <div class="field">
          <label>رقم اللوحة</label>
          <input id="plate" class="number" value="1259 EBA"/>
        </div>
        <div class="field">
          <label>نوع المركبة</label>
          <input id="make_name" value="مرسيدس – صهريج عادي" dir="rtl"/>
        </div>
        <div class="field">
          <label>موديل المركبة</label>
          <input id="model_year" class="number" value="2010"/>
        </div>
        <div class="field" style="grid-column: span 2;">
          <label>رقم الهيكل (Chassis)</label>
          <input id="chassis" class="number" value="WDB65803815440418"/>
        </div>
      </div>
    </div>
  </div>

  <!-- زر التوليد -->
  <div class="card">
    <div class="card-body" style="text-align:center;">
      <button class="btn btn-ins" onclick="generate()" style="margin:0 auto;">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
        </svg>
        توليد وثيقة التأمين
      </button>
    </div>
  </div>
</main>

<div id="toast"></div>

<script>
  function collectData() {
    const ids = ['policy_no','product_code','ins_date','exp_date',
                 'insured_name','national_id','address',
                 'seq_no','plate','make_name','model_year','chassis'];
    const d = {};
    ids.forEach(id => {
      const el = document.getElementById(id);
      if (el) d[id] = el.value.trim();
    });
    return d;
  }

  async function generate() {
    const btn = document.querySelector('.btn-ins');
    btn.disabled = true;
    showToast('⏳ جار توليد وثيقة التأمين...');

    try {
      const res = await fetch('/generate/insurance', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(collectData()),
      });
      if (!res.ok) {
        const err = await res.json();
        throw new Error(err.error || 'خطأ غير معروف');
      }
      const blob = await res.blob();
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'insurance_certificate.pdf';
      a.click();
      URL.revokeObjectURL(a.href);
      showToast('✅ تم التوليد بنجاح');
    } catch (e) {
      showToast('❌ ' + e.message, true);
    } finally {
      btn.disabled = false;
    }
  }

  function showToast(msg, isError) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = isError ? 'show error' : 'show';
    setTimeout(() => t.className = '', 3000);
  }
</script>
</body>
</html>
